- id: a1b2c3d4-e002-4002-8002-000000000002
  name: SEN-LNX-002 Network Configuration Discovery
  description: Read-only network configuration discovery
  tactic: discovery
  technique:
    attack_id: T1016
    name: System Network Configuration Discovery
  platforms:
    linux:
      sh:
        command: |
          OUT="/tmp/sensel-discovery-002.txt"
          {
            echo "=== ip addr ==="
            ip addr
            echo "=== ip route ==="
            ip route
            echo "=== resolv.conf ==="
            cat /etc/resolv.conf
          } > "${OUT}"
          python3 /opt/sensel/scripts/marker-writer.py --scenario-id SEN-LNX-002 --technique-id T1016 --result success --artifact-path "${OUT}"
