- id: a1b2c3d4-e001-4001-8001-000000000001
  name: SEN-LNX-001 Local Account Discovery
  description: Read-only local account discovery using getent passwd
  tactic: discovery
  technique:
    attack_id: T1087.001
    name: Local Account
  platforms:
    linux:
      sh:
        command: |
          OUT="/tmp/sensel-discovery-001.txt"; getent passwd | awk -F: '$2 == "x" || $2 == "*" || $2 == "!" {print $1":"$3":"$4":"$6":"$7}' > "${OUT}"; python3 /opt/sensel/scripts/marker-writer.py --scenario-id SEN-LNX-001 --technique-id T1087.001 --result success --artifact-path "${OUT}"
