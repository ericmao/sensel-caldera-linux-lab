%YAML 1.1
---
vars:
  address-groups:
    HOME_NET: "[172.30.0.0/16,172.31.0.0/24]"
    EXTERNAL_NET: "any"
  port-groups:
    HTTP_PORTS: "8888"
    SHELLCODE_PORTS: "!8888"

default-log-dir: /var/log/suricata/

stats:
  enabled: yes

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      types:
        - alert:
            tagged-packets: yes
        - http:
            extended: yes
        - flow

af-packet:
  - interface: eth0
    cluster-id: 98
    cluster-type: cluster_flow
    defrag: yes
  - interface: eth1
    cluster-id: 97
    cluster-type: cluster_flow
    defrag: yes
  - interface: eth2
    cluster-id: 96
    cluster-type: cluster_flow
    defrag: yes

app-layer:
  protocols:
    http:
      enabled: yes
    tls:
      enabled: no

detect:
  profile: low
  custom-values:
    toclient-groups: 3
    toserver-groups: 25

rule-files:
  - sensel-caldera.rules
